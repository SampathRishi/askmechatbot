# Render.com blueprint — one web service that runs the FastAPI backend AND
# serves the built React chat UI (server.py mounts frontend/dist at "/").
#
# Deploy: push this repo to GitHub, then in Render: New + -> Blueprint -> pick
# this repo. Render reads this file. See DEPLOY.md for the full walkthrough,
# including how to get the ~244 MB vector index onto the persistent disk.
services:
  - type: web
    name: askmechatbot
    runtime: python
    # PyTorch (via sentence-transformers) + ChromaDB need real memory; the free
    # and 512 MB tiers will OOM. "standard" is ~2 GB.
    plan: standard
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY   # set this in the Render dashboard (not in git)
        sync: false
      - key: DATA_DIR            # point config.DATA_DIR at the mounted disk
        value: /var/data
      - key: PYTHON_VERSION
        value: "3.11.9"
    # Persistent disk so the vector index survives restarts/redeploys.
    # Only data/chroma (+ data/brand) are needed at runtime (~244 MB), so 1 GB
    # is plenty. Raise if you re-crawl on the server (raw/processed also land here).
    disk:
      name: chroma-data
      mountPath: /var/data
      sizeGB: 1
